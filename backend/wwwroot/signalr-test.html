<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SignalR Queue Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <style>
    body { font-family: monospace; background: #0C0C0E; color: #F0F0F2; padding: 24px; }
    h2 { color: #E8572A; }
    input, button, select { 
      padding: 8px 12px; margin: 4px; border-radius: 6px; border: 1px solid #2A2A2E;
      background: #1C1C1F; color: #F0F0F2; font-family: monospace;
    }
    button { background: #E8572A; border: none; cursor: pointer; color: white; }
    button:hover { background: #CF4A1F; }
    #log { 
      background: #141416; border: 1px solid #2A2A2E; border-radius: 8px;
      padding: 16px; margin-top: 16px; height: 400px; overflow-y: auto;
    }
    .event { color: #22C55E; }
    .error { color: #EF4444; }
    .info { color: #8A8A96; }
    .queue { color: #E8572A; }
    input[type="text"] { width: 320px; }
  </style>
</head>
<body>

<h2>🏥 SignalR Queue Test</h2>

<div>
  <label>Access Token:</label><br>
  <input type="text" id="token" placeholder="Paste JWT access token here" />
</div>

<div style="margin-top:12px">
  <label>Doctor ID:</label><br>
  <input type="text" id="doctorId" placeholder="Doctor ID to watch" 
         value="fac099b7-0edf-41a7-95ce-43549cb62451" />
</div>

<div style="margin-top:12px">
  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <button onclick="joinQueue()">Join Doctor Queue</button>
  <button onclick="clearLog()">Clear Log</button>
</div>

<div style="margin-top:8px">
  <span id="status" style="color:#8A8A96">● Disconnected</span>
</div>

<div id="log"></div>

<script>
  let connection = null;

  function log(msg, type = 'info') {
    const div = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    div.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  function clearLog() {
    document.getElementById('log').innerHTML = '';
  }

  function setStatus(text, color) {
    const el = document.getElementById('status');
    el.textContent = '● ' + text;
    el.style.color = color;
  }

  async function connect() {
    const token = document.getElementById('token').value.trim();
    if (!token) { log('Paste a JWT token first.', 'error'); return; }

    connection = new signalR.HubConnectionBuilder()
      .withUrl('http://127.0.0.1:5000/hubs/queue', {
        accessTokenFactory: () => token,
        transport: signalR.HttpTransportType.WebSockets,
        skipNegotiation: true
      })
      .withAutomaticReconnect()
      .configureLogging(signalR.LogLevel.Information)
      .build();

    connection.on('QueueUpdated', (entry) => {
      log('QueueUpdated: ' + JSON.stringify(entry, null, 2), 'queue');
    });

    connection.onclose(() => {
      setStatus('Disconnected', '#EF4444');
      log('Connection closed.', 'error');
    });

    connection.onreconnecting(() => {
      setStatus('Reconnecting...', '#F59E0B');
      log('Reconnecting...', 'info');
    });

    connection.onreconnected(() => {
      setStatus('Connected', '#22C55E');
      log('Reconnected.', 'event');
    });

    try {
      await connection.start();
      setStatus('Connected', '#22C55E');
      log('Connected to SignalR hub.', 'event');
    } catch (err) {
      setStatus('Failed', '#EF4444');
      log('Connection failed: ' + err.message, 'error');
    }
  }

  async function joinQueue() {
    if (!connection) { log('Connect first.', 'error'); return; }
    const doctorId = document.getElementById('doctorId').value.trim();
    try {
      await connection.invoke('JoinDoctorQueue', doctorId);
      log('Joined queue group for doctor: ' + doctorId, 'event');
    } catch (err) {
      log('Join failed: ' + err.message, 'error');
    }
  }

  async function disconnect() {
    if (connection) {
      await connection.stop();
      connection = null;
      setStatus('Disconnected', '#EF4444');
      log('Disconnected.', 'info');
    }
  }
</script>

</body>
</html>
